experiment:
  name: medsam_btcv
  log_dir: ./logs

model:
  name: medsam
  in_channels: 1
  out_channels: 14             # 0 background + 13 organs
  # checkpoint: /path/to/medsam_vit_b.pth   # MedSAM weights (recommended)
  # checkpoint: /path/to/sam_vit_b_01ec64.pth  # original SAM weights
  freeze_encoder: true         # only train the decoder (0.16 M params)
  slice_axis: 2                # 0=sagittal  1=coronal  2=axial
  slice_batch: 8               # slices per GPU call; lower if OOM

data:
  dataset: btcv
  dataset_root: /home/hank/medical_segmention/dataset
  splits_json: /home/hank/medical_segmention/dataset/btcv/splits.json
  patch_size: [96, 96, 96]
  spacing: [1.5, 1.5, 2.0]
  batch_size: 1                # larger model; keep batch_size=1
  num_workers: 4
  cache_rate: 0.1

training:
  max_epochs: 500
  lr: 1.0e-4
  weight_decay: 1.0e-5
  loss: dice_ce
